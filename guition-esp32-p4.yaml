# Guition ESP32-P4 + ESP32-C6 (SDIO hosted WiFi/BLE)
# Minimal hardware profile — no display/LVGL for fast compile cycles.
---
esp32:
  board: esp32-p4-evboard
  variant: esp32p4
  flash_size: 16MB
  cpu_frequency: 360MHz
  engineering_sample: true
  framework:
    type: esp-idf
    sdkconfig_options:
      CONFIG_ESP_MAIN_TASK_STACK_SIZE: "8192"
      CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL: "512"
      CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL: "32768"
      CONFIG_SPIRAM_USE_MALLOC: "y"
      CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"
      CONFIG_SPIRAM_ALLOW_BSS_SEG_EXTERNAL_MEMORY: "y"
      CONFIG_SPIRAM_ALLOW_NOINIT_SEG_EXTERNAL_MEMORY: "y"
    advanced:
      enable_idf_experimental_features: true
      execute_from_psram: true

esp_ldo:
  - channel: 3
    id: dsi_phy_enable
    voltage: 2.5V
    adjustable: true
  - channel: 4
    id: sd_card_power
    voltage: 2.7V
    adjustable: true

psram:
  mode: hex
  speed: 200MHz

esp32_hosted:
  variant: ESP32C6
  reset_pin: GPIO54
  cmd_pin: GPIO19
  clk_pin: GPIO18
  d0_pin: GPIO14
  d1_pin: GPIO15
  d2_pin: GPIO16
  d3_pin: GPIO17
  active_high: true
  sdio_frequency: 10MHz
