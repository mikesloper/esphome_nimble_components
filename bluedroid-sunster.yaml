---
# Bluedroid Sunster diesel heater test — compare heap vs nimble-sunster.yaml.
# Build: esphome compile bluedroid-sunster.yaml

esphome:
  name: victron-sunster-bd
  min_version: 2026.3.0
  includes:
    - lib/air_heater_ble.h
    - lib/air_heater_state.h
  includes_c:
    - lib/air_heater_ble.cpp

logger:
  level: debug

api:

packages:
  wifi: !include wifi-bluedroid.yaml
  hardware: !include guition-esp32-p4-bluedroid.yaml
  sunster: !include sunster/sunster-bluedroid.yaml

debug:
  update_interval: 10s

sensor:
  - platform: debug
    free:
      name: "Free Internal Heap"
    block:
      name: "Largest Free Block (Internal)"
    min_free:
      name: "Min Free Heap (Internal)"
    psram:
      name: "Free PSRAM"

  - platform: uptime
    name: "Uptime Minutes"
    id: uptime_minutes
    filters:
      - lambda: return x / 60;
