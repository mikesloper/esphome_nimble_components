---
# NimBLE Sunster diesel heater — GATT client via nimble_sunster component.
nimble_sunster:
  id: heater_nimble
  nimble_host_id: nimble_bt
  mac_address: 70:19:88:3B:B8:63
  service_uuid: "ffe0"
  characteristic_uuid: "ffe1"
  auto_connect: true
  running_binary_sensor: stato_Bruciatore
  glow_plug_text_sensor: stato_Candeletta
  mode_text_sensor: Mode_Burner
  error_code_sensor: Error_Code
  battery_voltage_sensor: heat_battery_voltage
  altitude_sensor: altitude
  running_status_code_sensor: running_status_code
  room_temperature_sensor: room_temperature
  heating_temperature_sensor: heating_temperature
  heater_level_number: heater_level
  heater_temperature_number: heater_temperature

