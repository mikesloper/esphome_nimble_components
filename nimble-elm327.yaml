---
# NimBLE ELM327 / OBD-II test (GATT client on hosted C6).
# Build: esphome compile victron-test-elm327.yaml
#
# Do not combine with Victron passive scan in one firmware without coordination —
# both use the NimBLE GAP scanner. Use separate test images or a disabler (see dashboard).

esphome:
  name: victron-elm327
  min_version: 2026.3.0
  on_boot:
    - priority: 700
      then:
        - lambda: |-
            id(odbii_rpm).publish_state(0);
            id(odbii_coolant_temp).publish_state(0);
            id(odbii_kph).publish_state(0);

external_components:
  - source:
      type: local
      path: components

logger:
  level: debug

api:

esp32:
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      loop_task_stack_size: 16384

nimble_host:
  id: nimble_bt

packages:
  wifi: !include wifi-nimble.yaml
  hardware: !include guition-esp32-p4-nimble.yaml
  elm327: !include elm327/elm327-nimble.yaml

debug:
  update_interval: 10s

sensor:
  - platform: debug
    free:
      name: "Free Internal Heap"
    block:
      name: "Largest Free Block (Internal)"
    min_free:
      name: "Min Free Heap (Internal)"
    psram:
      name: "Free PSRAM"

  - platform: uptime
    name: "Uptime Minutes"
    id: uptime_minutes
    filters:
      - lambda: return x / 60;
