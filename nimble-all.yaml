---
# All four NimBLE devices on one firmware (Guition ESP32-P4 + C6):
#   - Victron SmartShunt (passive BLE adv)
#   - Renogy Rover / DCC50S (GATT)
#   - JBD BMS (GATT)
#   - Sunster diesel heater (GATT)
#
# Scan/connect is coordinated by nimble_gap (wifi-nimble.yaml).
# Build: esphome compile nimble-all.yaml
# Flash: esphome run nimble-all.yaml

esphome:
  name: victron-all
  min_version: 2026.3.0
  includes:
    - lib/air_heater_ble.h
    - lib/air_heater_state.h
  includes_c:
    - lib/air_heater_ble.cpp

external_components:
  - source:
      type: local
      path: components

logger:
  level: debug

api:

esp32:
  framework:
    type: esp-idf
    advanced:
      execute_from_psram: true
      loop_task_stack_size: 20480

nimble_host:
  id: nimble_bt

packages:
  wifi: !include wifi-nimble.yaml
  hardware: !include guition-esp32-p4-nimble.yaml
  victron: !include victron/smartshunt.yaml
  renogy: !include renogy/rover-nimble.yaml
  jdb: !include jdb/bms-nimble.yaml
  sunster: !include sunster/sunster-nimble.yaml

debug:
  update_interval: 10s

sensor:
  - platform: debug
    free:
      name: "Free Internal Heap"
    block:
      name: "Largest Free Block (Internal)"
    min_free:
      name: "Min Free Heap (Internal)"
    psram:
      name: "Free PSRAM"
    loop_time:
      name: "Loop Time"

  - platform: uptime
    name: "Uptime Minutes"
    id: uptime_minutes
    filters:
      - lambda: return x / 60;
